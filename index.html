<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>林業AR境界ビューアーナビ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; color: white; }
    
    /* 画面切り替え用の共通スタイル */
    .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    .screen-active { display: block; }

    /* === AR画面 === */
    #camera-view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
    
    /* 複数表示される光の柱のスタイル */
    .light-pillar {
      position: absolute; bottom: 0; width: 40px; height: 75vh;
      z-index: 10; transform: translateX(-50%); display: none;
      transition: left 0.05s ease-out; text-align: center;
    }
    .pillar-body { width: 100%; height: 100%; filter: blur(2px); }
    
    /* 【改善】ARラベルのスタイル：大きく、わかりやすく */
    .pillar-label {
      position: absolute; top: -55px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid white; padding: 4px 8px; border-radius: 6px;
      font-size: 16px; font-weight: bold; white-space: nowrap; line-height: 1.2; text-align: center;
    }

    /* メイン操作パネル（AR画面下部） */
    #control-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 480px; z-index: 20; display: none; }
    .glass-box { background: rgba(0,0,0,0.7); padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    
    /* 手入力フォーム */
    .input-form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px; }
    .input-form input { background: rgba(255,255,255,0.1); border: 1px solid #555; color: white; padding: 6px; border-radius: 4px; font-size: 14px; flex: 1; min-width: 80px; }
    .input-form input[type="number"]::-webkit-outer-spin-button, .input-form input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* コントロール群 */
    .control-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; }
    .nav-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* 共通ボタンスタイル */
    .btn { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; white-space: nowrap; }
    .btn-blue { background: #007bff; } .btn-green { background: #28a745; } .btn-orange { background: #ff9800; } .btn-red { background: #dc3545; }
    .btn-add { padding: 6px 12px; font-size: 13px; } /* 手入力用 */

    /* === 地図画面・一覧画面共通 === */
    .screen-header { height: 60px; background: #333; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; }
    .screen-title { font-weight:bold; font-size: 16px; }

    /* === 地図画面 === */
    #map { width: 100%; height: calc(100vh - 60px); }

    /* === 一覧画面 === */
    #point-list-screen { background: #1a1a1a; }
    #point-list-content { width: 100%; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
    .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .list-item-info { font-size: 13px; line-height: 1.4; }
    .list-item-coord { color: #bbb; }
    
    /* === スタート画面 === */
    #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    /* アイコン追加 */
    #app-icon { width: 96px; height: 96px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="start-overlay">
    <img id="app-icon" src="forestry-ar-icon.png" alt="境界ARアイコン">
    <h2>林業AR境界ビューアーナビ</h2>
    <p>カメラ・GPS・コンパスを使用します</p>
    <button class="btn btn-blue" style="font-size:18px; padding:15px 30px; margin-top:20px;" onclick="initApp()">アプリを起動する</button>
  </div>

  <div id="ar-screen" class="screen screen-active">
    <video id="camera-view" autoplay playsinline muted></video>
    <div id="pillars-container"></div>
    <div id="control-panel">
      <div class="glass-box">
        <div class="input-form">
          <input type="text" id="manual-name" placeholder="点名 (例: P6)">
          <input type="number" id="manual-lat" placeholder="緯度 (36.xxx)" step="0.000001">
          <input type="number" id="manual-lng" placeholder="経度 (136.xxx)" step="0.000001">
          <button class="btn btn-green btn-add" onclick="manualAddPoint()">追加</button>
        </div>
        <div class="control-row">
          <div>登録数: <span id="count-display" style="font-size:1.2em; font-weight:bold; color:#fff;">0</span></div>
          <button class="btn btn-orange" style="padding:6px 12px; font-size:12px;" onclick="toggleFlip()">🔄 180度反転</button>
          <button class="btn btn-red" style="padding:6px 12px; font-size:12px;" onclick="clearPoints()">🗑 クリア</button>
        </div>
        <div class="nav-buttons">
          <button class="btn btn-blue" onclick="showMapScreen()">🗺 地図で追加</button>
          <button class="btn btn-blue" onclick="showListScreen()">📄 座標一覧</button>
        </div>
      </div>
    </div>
  </div>

  <div id="map-screen" class="screen">
    <div class="screen-header">
      <span class="screen-title">地図タップで追加</span>
      <button class="btn btn-blue" onclick="showArScreen()">AR画面に戻る</button>
    </div>
    <div id="map"></div>
  </div>

  <div id="point-list-screen" class="screen">
    <div class="screen-header">
      <span class="screen-title">登録座標一覧</span>
      <button class="btn btn-blue" onclick="showArScreen()">AR画面に戻る</button>
    </div>
    <div id="point-list-content">
      </div>
  </div>

  <script>
    const STORAGE_KEY = 'forestry_ar_points'; // localStorage用のキー
    let currentLat = null, currentLng = null;
    let currentHeading = 0, headingOffset = 0;
    let points = []; 
    const FOV = FOV = 60; 
    let map = null, markerGroup = null;

    // ページロード時にlocalStorageからポイントを読み込む
    loadPoints();

    // 1. アプリ初期化
    async function initApp() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') return alert('コンパスが拒否されました。');
        } catch (e) { console.error(e); }
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-view').srcObject = stream;
      } catch (err) { return alert('カメラの起動に失敗しました。'); }

      window.addEventListener('deviceorientation', handleOrientation, true);
      navigator.geolocation.watchPosition(
        pos => { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; updateView(); },
        err => console.warn('GPS Error'), { enableHighAccuracy: true }
      );

      document.getElementById('start-overlay').style.display = 'none';
      document.getElementById('control-panel').style.display = 'block';
      
      initLeafletMap();
      updateUI(); // 初回UI更新
      updateView(); // 初回AR描画
    }

    // 2. 地理院地図の初期化
    function initLeafletMap() {
      if (map) return; // 既に初期化済みなら何もしない
      map = L.map('map').setView([36.058, 136.251], 14);
      
      const gsiStdLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院地図</a>"
      }).addTo(map);

      const gsiPhotoLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院地図</a>"
      });

      L.control.layers({"地図/等高線": gsiStdLayer, "写真": gsiPhotoLayer}, null, {collapsed:false}).addTo(map);
      markerGroup = L.layerGroup().addTo(map);

      // 地図タップ時のイベント
      map.on('click', function(e) {
        const pName = prompt('点名を入力してください。', `P${points.length + 1}`);
        if(pName === null) return; // キャンセルされたら何もしない
        points.push({ lat: e.latlng.lat, lng: e.latlng.lng, name: pName || `P${points.length + 1}` });
        savePoints(); // ポイントを保存
        updateUIAndMarkers();
        updateView();
      });
      updateUIAndMarkers(); // 初期マーカー描画
    }

    // 3. ポイント追加の共通処理
    function updateUIAndMarkers() {
      // 地図上のマーカーをクリアして再配置
      if(markerGroup) {
        markerGroup.clearLayers();
        points.forEach(p => {
          L.marker([p.lat, p.lng]).addTo(markerGroup).bindPopup(p.name);
        });
      }
      updateUI();
    }

    // 4. 【追加】手入力でのポイント追加
    function manualAddPoint() {
      const nameInput = document.getElementById('manual-name');
      const latInput = document.getElementById('manual-lat');
      const lngInput = document.getElementById('manual-lng');
      
      const name = nameInput.value || `P${points.length + 1}`;
      const lat = parseFloat(latInput.value);
      const lng = parseFloat(lngInput.value);
      
      if(isNaN(lat) || isNaN(lng)) {
        alert('緯度、経度を数値で入力してください。');
        return;
      }
      
      points.push({ lat: lat, lng: lng, name: name });
      savePoints(); // ポイントを保存
      updateUIAndMarkers();
      updateView();
      
      // 入力欄をクリア
      nameInput.value = '';
      latInput.value = '';
      lngInput.value = '';
      
      alert(`「${name}」を追加しました。AR画面で向きを確認してください。`);
    }

    // 5. 【追加】画面遷移関数
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
      document.getElementById(screenId).classList.add('screen-active');
    }

    function showArScreen() { showScreen('ar-screen'); }
    function showMapScreen() {
      showScreen('map-screen');
      if(map) {
        map.invalidateSize();
        if(currentLat && currentLng) map.setView([currentLat, currentLng], 16);
      }
    }
    function showListScreen() {
      showScreen('point-list-screen');
      updatePointList();
    }

    // 6. 【追加】座標一覧リストの生成
    function updatePointList() {
      const content = document.getElementById('point-list-content');
      content.innerHTML = '';
      if(points.length === 0) {
        content.innerHTML = '<p style="text-align:center; color:#bbb;">ポイント未登録</p>';
        return;
      }
      points.forEach((p, index) => {
        const item = `
          <div class="list-item">
            <div class="list-item-info">
              <div style="font-weight:bold; font-size:15px; color:#fff;">${p.name}</div>
              <div class="list-item-coord">緯度: ${p.lat.toFixed(6)}<br>経度: ${p.lng.toFixed(6)}</div>
            </div>
            <button class="btn btn-red btn-add" style="font-size:12px; padding:6px 10px;" onclick="deletePoint(${index})">削除</button>
          </div>
        `;
        content.insertAdjacentHTML('beforeend', item);
      });
    }

    function deletePoint(index) {
      if(!confirm('このポイントを削除しますか？')) return;
      points.splice(index, 1);
      savePoints(); // ポイントを保存
      updatePointList(); // リスト画面を更新
      updateUIAndMarkers(); // 他の画面も更新
      updateView();
    }

    // 7. 【追加】ポイントの保存と読み込み (localStorage)
    function savePoints() { localStorage.setItem(STORAGE_KEY, JSON.stringify(points)); }
    function loadPoints() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if(stored) points = JSON.parse(stored);
    }

    function clearPoints() {
      if(!confirm('登録したすべてのポイントをクリアしますか？')) return;
      points = [];
      savePoints(); // ポイントを保存
      updateUIAndMarkers();
      updateView();
    }

    function toggleFlip() { headingOffset = headingOffset === 0 ? 180 : 0; updateView(); }

    function updateUI() { document.getElementById('count-display').innerText = points.length; }

    function handleOrientation(event) {
      let rawHeading = 0;
      if (event.webkitCompassHeading) rawHeading = event.webkitCompassHeading;
      else if (event.alpha !== null) rawHeading = 360 - event.alpha;
      currentHeading = (rawHeading + headingOffset) % 360;
      updateView();
    }

    // 8. 複数AR描画 
    function updateView() {
      if (!currentLat || points.length === 0 || !document.getElementById('ar-screen').classList.contains('screen-active')) return;
      const container = document.getElementById('pillars-container');
      container.innerHTML = ''; 

      points.forEach((p, index) => {
        const dist = calcDistance(currentLat, currentLng, p.lat, p.lng);
        const targetBearing = calcBearing(currentLat, currentLng, p.lat, p.lng);

        let angleDiff = targetBearing - currentHeading;
        if (angleDiff > 180) angleDiff -= 360;
        if (angleDiff < -180) angleDiff += 360;

        if (Math.abs(angleDiff) < FOV / 2) {
          const screenX = 50 + (angleDiff / (FOV / 2)) * 50;
          const scale = Math.max(0.3, 40 / Math.max(dist, 1));

          let hue = 0; 
          if (dist < 50) hue = (dist / 50) * 60; 
          else if (dist < 150) hue = 60 + ((dist - 50) / 100) * 160; 
          else hue = 220;

          // 【改善】ラベルを大きく、2行に。中央揃えで配置
          const pillarHtml = `
            <div class="light-pillar" style="display:block; left:${screenX}%; transform:translateX(-50%) scaleX(${scale});">
              <div class="pillar-label">${p.name}<br>${Math.round(dist)} m</div>
              <div class="pillar-body" style="background: linear-gradient(to top, hsla(${hue}, 100%, 50%, 0.8), hsla(${hue}, 100%, 50%, 0)); box-shadow: 0 0 15px hsla(${hue}, 100%, 50%, 0.6);"></div>
            </div>
          `;
          container.insertAdjacentHTML('beforeend', pillarHtml);
        }
      });
    }

    function calcDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
      const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function calcBearing(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
      const λ1 = lon1 * Math.PI/180, λ2 = lon2 * Math.PI/180;
      const y = Math.sin(λ2-λ1) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(λ2-λ1);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          window.location.reload();
          refreshing = true;
        }
      });
    }
  </script>
</body>
</html>
