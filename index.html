<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR境界アプリ (iOSフリーズ対策版)</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    /* スタート画面 */
    #start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }
    #start-btn {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    /* 入力用UIパネル */
    #ui-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      padding: 15px;
      border-radius: 10px;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-family: sans-serif;
      display: none; /* 初期状態は非表示 */
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button.action-btn {
      width: 100%;
      padding: 10px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <div id="start-overlay">
    <h2>AR境界ビューアー</h2>
    <p>カメラとセンサーの許可が必要です</p>
    <button id="start-btn" onclick="requestPermissions()">ARを開始する</button>
  </div>

  <div id="ui-container">
    <label>緯度 (Latitude):</label>
    <input type="number" id="lat-input" step="0.000001" placeholder="例: 36.05803">
    <label>経度 (Longitude):</label>
    <input type="number" id="lng-input" step="0.000001" placeholder="例: 136.25158">
    <button class="action-btn" onclick="setBoundaryPoint()">光の柱を設置</button>
  </div>

  <div id="ar-container"></div>

  <script>
    // 1. コンパスの許可を最優先でリクエスト
    function requestPermissions() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13以降
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              initAR(); // 許可されたらARを展開
            } else {
              alert('コンパスのアクセスが拒否されました。設定からSafariのセンサーアクセスを許可してください。');
            }
          })
          .catch(console.error);
      } else {
        // Androidや古いiOSの場合はそのまま進む
        initAR();
      }
    }

    // 2. 許可が取れた後にAR本体（a-scene）を動的にHTMLに挿入
    function initAR() {
      document.getElementById('start-overlay').style.display = 'none';
      document.getElementById('ui-container').style.display = 'block';

      const arContainer = document.getElementById('ar-container');
      
      // ここで初めてA-FrameとAR.jsが初期化され、カメラとGPSの許可を取りに行く
      arContainer.innerHTML = `
        <a-scene
          vr-mode-ui="enabled: false"
          embedded
          arjs="sourceType: webcam; debugUIEnabled: false;">
          <a-camera gps-camera rotation-reader></a-camera>

          <a-entity id="boundary-marker" visible="false">
            <a-cylinder radius="0.5" height="50" color="#ffff00" opacity="0.6" material="emissive: #ffff00; emissiveIntensity: 0.8"></a-cylinder>
            <a-text value="Target Point" align="center" position="0 2 0" scale="3 3 3" color="red"></a-text>
          </a-entity>
        </a-scene>
      `;
    }

    // 3. 緯度経度をセットして光の柱を表示
    function setBoundaryPoint() {
      const lat = document.getElementById('lat-input').value;
      const lng = document.getElementById('lng-input').value;

      if (!lat || !lng) {
        alert('緯度と経度を入力してください。');
        return;
      }

      // 動的生成された要素を取得
      const marker = document.getElementById('boundary-marker');
      
      marker.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
      marker.setAttribute('position', '0 25 0');
      marker.setAttribute('visible', 'true');
      alert('光の柱を設置しました。カメラを周囲に向けて探してみてください。');
    }
  </script>
</body>
</html>
